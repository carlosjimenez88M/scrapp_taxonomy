name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment:
      name: pypi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Build distributions
        run: uv build --no-sources

      - name: Smoke test wheel
        run: uv run --isolated --no-project --with dist/*.whl --with pytest pytest tests/smoke_test.py

      - name: Smoke test source distribution
        run: uv run --isolated --no-project --with dist/*.tar.gz --with pytest pytest tests/smoke_test.py

      - name: Publish
        run: uv publish --trusted-publishing always
